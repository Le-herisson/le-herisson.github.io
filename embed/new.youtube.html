<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>Youtube Player</title>
    <meta name="description" content="YouTube videos without ads...">
    <meta property="og:url" content="https://le-herisson.github.io/embed/youtube">
    <meta property="og:type" content="website">
    <meta property="og:title" content="ytvwoa">
    <meta property="og:description" content="YouTube videos without ads...">
    <meta property="og:image" content="../src/YTNC.ico">
    <meta property="og:image:width" content="256">
    <meta property="og:image:height" content="256">
</head>    
<body>
    <div>
        <h3 id="InfoText"></h3>
        <iframe id="iframeYt" src="about:blank" width="100%" style="border-radius: 0px; border: none; aspect-ratio: 16/9; min-height: 250px;" allowfullscreen></iframe>
    </div>
    <script>
        function IdError(r) {
            let infoText=document.getElementById('InfoText');
            infoText.innerHTML='Error please see the console : '+r;
            infoText.style.fontFamily='Consolas, monospace';
            infoText.style.backgroundColor='Red';
            console.debug(r);
            console.error(r=='missing'?'The id is not specified':r=='invalid'?'The id specified is invalid':'Error');
            console.warn("Use ?vId=:vidId like : /[a-zA-Z0-9-_]{11}/g");
            document.getElementById('iframeYt').remove();
            document.title='Youtube Player - Invalid vId...';
        }
        const qsp=new URLSearchParams(window.location.search);
        if(qsp.has('dm')&&qsp.get('dm')=='on'){document.body.style.backgroundColor="#101010";}
        if(qsp.has('vId')){
            qsp.append('id',qsp.get('vId'));
            qsp.delete('vId');
        }
        if(qsp.get('id')==null){
            IdError('missing');
        }else{
            const id=qsp.get('id');
            console.debug("id = "+id);
            if(id.length!==11){
                IdError('invalidLenght')
            }else{
                let pattern=/[a-zA-Z0-9-_]{11}/;
                if(pattern.test(id)) {
                    fetch(`https://youtube.com/oembed?url=https://youtu.be/${id}`).then(res=>res.json())
                        .then((res)=>{
                            document.title=`${res['title'].slice(0,29)}... - ${document.title}`;
                            document.getElementById('iframeYt').src=`https://www.yout-ube.com/embed/${id}?iv_load_policy=3&start=0&cc_load_policy=0&playsinline=0`;
                            if("mediaSession" in navigator){
                                navigator.mediaSession.metadata=new MediaMetadata({
                                    title: res['title'],
                                    artist: res['author_name'],
                                    album: "",
                                    artwork: [{
                                        src: res['thumbnail_url'],
                                        sizes: `${res['thumbnail_height']}x${res['thumbnail_width']}`,
                                        type: "image/jpeg"
                                    }]
                                });
                            }
                        }).catch(()=>{IdError('invalid');});
                }else{IdError('invalid');}
            }
        }
    </script>
</body>
</html>
