<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <title>url redirector</title>
    <meta name="color-scheme" content="dark">
</head>
<body>
    <div id="box"> </div>
    <noscript>
        <p>
            To use this webpage please enable JavaScript.
        </p>
    </noscript>
    <script>
        async function fetchApi() {
            return await fetch("/Api/conf.json", { method: "GET" }).then(async(r)=>{ return await r.json(); }).catch((e)=>{ document.getElementById("box").innerText="The parameter is invalid or missing: "+e; }); 
        }

        const params = new URLSearchParams(window.location.search);
        const o = params.get('o');
        if(
            o !== "" &&
            o.split("_")[1].length == 8
        ){
            const _res = JSON.parse(fetchApi());
            if ( _res.availablesSrc[o.split("_")[0]].contains(o.split("_")[1]) ) {
                setTimeout(()=>{window.location.href=_res.sources[o.split("_")[1]];},250);
            }
        }else{
            document.getElementById("box").innerText="The parameter is invalid or missing";
        }
    </script>
</body>
</html>
